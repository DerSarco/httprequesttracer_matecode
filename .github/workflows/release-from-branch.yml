name: Release From Branch

on:
  push:
    branches:
      - "release/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (X.Y.Z). Optional if running from release/vX.Y.Z"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}-${{ github.event.inputs.version || 'auto' }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve version and prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      release_id: ${{ steps.release.outputs.release_id }}
      release_url: ${{ steps.release.outputs.release_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          input_version="${{ github.event.inputs.version }}"

          if [[ -n "$input_version" ]]; then
            raw_version="$input_version"
          else
            branch="${GITHUB_REF_NAME}"
            raw_version="${branch#release/}"
          fi

          version="${raw_version#v}"

          if [[ ! "$version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release version must follow X.Y.Z (or vX.Y.Z). Got: ${raw_version}"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Validate app version files
        shell: bash
        run: |
          branch_version="${{ steps.version.outputs.version }}"
          package_version="$(node -p "require('./package.json').version")"
          cargo_version="$(grep -m1 '^version = "' src-tauri/Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"
          tauri_conf_version="$(node -p "JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json', 'utf8')).version")"

          if [[ "$package_version" != "$branch_version" ]]; then
            echo "package.json version ($package_version) does not match release version ($branch_version)"
            exit 1
          fi

          if [[ "$cargo_version" != "$branch_version" ]]; then
            echo "src-tauri/Cargo.toml version ($cargo_version) does not match release version ($branch_version)"
            exit 1
          fi

          if [[ "$tauri_conf_version" != "$branch_version" ]]; then
            echo "src-tauri/tauri.conf.json version ($tauri_conf_version) does not match release version ($branch_version)"
            exit 1
          fi

      - name: Create or reuse GitHub release
        id: release
        uses: actions/github-script@v7
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.TAG;
            const version = process.env.VERSION;
            const fs = require('fs');
            const templatePath = '.github/release-notes-template.md';
            const releaseDate = new Date().toISOString().slice(0, 10);
            let releaseBody = '';
            if (fs.existsSync(templatePath)) {
              releaseBody = fs.readFileSync(templatePath, 'utf8')
                .replaceAll('{{TAG}}', tag)
                .replaceAll('{{VERSION}}', version)
                .replaceAll('{{DATE}}', releaseDate);
            }
            let release;

            try {
              release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            if (!release) {
              release = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: `Release ${tag}`,
                target_commitish: context.sha,
                draft: true,
                prerelease: version.includes('-'),
                generate_release_notes: true,
                body: releaseBody,
              });
            }

            core.setOutput('release_id', String(release.data.id));
            core.setOutput('release_url', release.data.html_url);

  build_macos:
    name: Build macOS bundle (${{ matrix.target }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-aarch64
          - runner: macos-13
            target: x86_64-apple-darwin
            suffix: macos-x64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundle
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Package .app as zip
        id: package
        shell: bash
        run: |
          app_path="src-tauri/target/${{ matrix.target }}/release/bundle/macos/HTTP Request Tracer.app"
          zip_path="src-tauri/target/${{ matrix.target }}/release/bundle/macos/HTTP-Request-Tracer-${{ needs.prepare.outputs.version }}-${{ matrix.suffix }}.zip"

          if [[ ! -d "$app_path" ]]; then
            echo "App bundle not found at $app_path"
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$zip_path"
          echo "zip_path=$zip_path" >> "$GITHUB_OUTPUT"

      - name: Upload artifact to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.prepare.outputs.tag }}" "${{ steps.package.outputs.zip_path }}" --clobber

  summary:
    name: Release summary
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_macos
    steps:
      - name: Print release URL
        run: |
          echo "Release draft ready: ${{ needs.prepare.outputs.release_url }}"
