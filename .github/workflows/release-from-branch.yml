name: Release From Branch

on:
  push:
    branches:
      - "release/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Validate and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve version from release branch
        id: version
        shell: bash
        run: |
          branch="${GITHUB_REF_NAME}"
          raw_version="${branch#release/}"
          version="${raw_version#v}"

          if [[ ! "$version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Branch must follow release/vX.Y.Z (or release/X.Y.Z). Got: ${branch}"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Validate app version files
        shell: bash
        run: |
          branch_version="${{ steps.version.outputs.version }}"
          package_version="$(node -p "require('./package.json').version")"
          cargo_version="$(grep -m1 '^version = "' src-tauri/Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"

          if [[ "$package_version" != "$branch_version" ]]; then
            echo "package.json version ($package_version) does not match branch version ($branch_version)"
            exit 1
          fi

          if [[ "$cargo_version" != "$branch_version" ]]; then
            echo "src-tauri/Cargo.toml version ($cargo_version) does not match branch version ($branch_version)"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check if release tag already exists
        id: tag_check
        shell: bash
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true

      - name: Skip existing release tag
        if: steps.tag_check.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.tag }} already exists. Skipping release creation."
